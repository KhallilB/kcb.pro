name: Release

on:
  workflow_run:
    workflows: ['Build & Merge Prod Client', 'Build & Merge Prod Server']
    types:
      - completed

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Setup git
        run: |
          git config --global user.name "KhallilB"
          git config --global user.email "khallilbailey@gmail.com"

      - name: Create Release Draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run release -- --ci --github.release --github.draft --preRelease --github.releaseName="Release v${{ steps.version.outputs.version }}" --github.autoGenerate
